apiVersion: apps/v1
kind: Deployment
metadata:
name: simple-java-app-deployment
labels:
app: simple-java-app
spec:
replicas: 1
selector:
matchLabels:
app: simple-java-app
template:
metadata:
labels:
app: simple-java-app
spec:
containers:
- name: simple-java-app
image: ramlingams/simple-java-app:latest
imagePullPolicy: Always
ports:
- containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
name: simple-java-app-service
spec:
selector:
app: simple-java-app
ports:

* protocol: TCP
  port: 80
  targetPort: 8080
  type: NodePort
